<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keno Ultra Pro Max - @filimoon21</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0a0a0a; --gold: #f39c12; --green: #2ecc71; --red: #e74c3c; --card: #161616; --num-bg: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; text-align: center; user-select: none; overflow-x: hidden; }
        
        .header { background: linear-gradient(145deg, #222, #000); padding: 15px; border-radius: 20px; border: 2px solid var(--gold); margin-bottom: 10px; }
        .balance { font-size: 28px; font-weight: 900; color: var(--gold); }
        
        .display-area { background: var(--card); border-radius: 18px; padding: 10px; border: 1px solid #333; min-height: 120px; margin-bottom: 10px; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #currentNum { font-size: 60px; font-weight: bold; color: var(--gold); margin: 0; text-shadow: 0 0 20px var(--gold); }
        #countdownOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; font-size: 26px; color: var(--gold); border-radius: 18px; z-index: 10; font-weight: bold; border: 2px solid var(--gold); }

        .balls-container { display: flex; overflow-x: auto; gap: 8px; padding: 10px; scroll-behavior: smooth; min-height: 50px; width: 100%; }
        .ball { min-width: 40px; height: 40px; background: white; border-radius: 50%; color: black; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 16px; animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .game-layout { display: grid; grid-template-columns: 2.3fr 1.2fr; gap: 10px; margin-top: 5px; }
        
        .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; background: #000; padding: 8px; border-radius: 15px; border: 1px solid #333; }
        .num { background: var(--num-bg); padding: 12px 0; font-size: 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; border-bottom: 3px solid rgba(0,0,0,0.3); }
        .num.selected { background: var(--gold); color: black; font-weight: bold; transform: scale(0.95); }
        .num.winner { background: var(--green) !important; color: white; box-shadow: 0 0 10px var(--green); }

        .sidebar { background: #111; border-radius: 15px; padding: 8px; font-size: 10px; border: 1px solid #333; height: 320px; overflow-y: hidden; position: relative; }
        .side-title { font-weight:bold; color:var(--gold); border-bottom:1px solid #444; margin-bottom:8px; padding-bottom:5px; font-size: 11px; }
        .side-item { padding: 8px 5px; border-bottom: 1px solid #222; animation: slideIn 0.5s ease-out; text-align: left; line-height: 1.3; }
        .win-text { color: var(--green); font-weight: bold; }
        .lose-text { color: #888; }

        .controls { margin-top: 15px; }
        input { width: 85%; padding: 14px; margin: 5px 0; background: #111; color: var(--gold); border: 1px solid #444; border-radius: 12px; text-align: center; font-size: 20px; font-weight: bold; outline: none; }
        
        .btn { padding: 16px; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .play-btn { background: linear-gradient(135deg, #f39c12, #e67e22); color: black; box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4); }
        .play-btn:disabled { background: #444; color: #888; box-shadow: none; cursor: not-allowed; }

        .panel { position: fixed; top: 5%; left: 5%; width: 90%; max-height: 90vh; background: #161616; border: 2px solid var(--gold); padding: 25px; border-radius: 25px; display: none; z-index: 1000; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.9); }

        @keyframes pop { from { transform: scale(0) rotate(-180deg); } to { transform: scale(1) rotate(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body ondblclick="handleAdminOpen()">

    <div id="loginPanel" class="panel" style="display:block; position: static; width: 100%; border:none; background: transparent;">
        <h2 style="color:var(--gold); font-size: 28px;">KENO ULTRA</h2>
        <p style="color:#aaa;">ለመጀመር ስልክ ቁጥርዎን ያስገቡ</p>
        <input type="number" id="phoneInput" placeholder="09xxxxxxxx">
        <button class="btn play-btn" onclick="login()">ይግቡ</button>
    </div>

    <div id="gameArea" style="display:none;">
        <div class="header">
            <div id="userIdDisplay" style="font-size:12px; color:#888; font-weight: bold;">ID: --</div>
            <div class="balance"><span id="balanceDisplay">0.00</span> ETB</div>
        </div>

        <div class="display-area">
            <div id="countdownOverlay">ቀጣይ ጨዋታ በ <span id="timerSec">35</span>...</div>
            <div id="currentNum">READY</div>
            <div id="ballsContainer" class="balls-container"></div>
        </div>

        <div class="game-layout">
            <div>
                <div id="gameStatus" style="font-size: 13px; margin-bottom: 8px; color: var(--gold); font-weight: bold;">ቁጥሮችን ይምረጡ (2 ወይም 5)</div>
                <div class="grid" id="kenoGrid"></div>
            </div>
            <div class="sidebar">
                <div class="side-title">LIVE BETS 🔴</div>
                <div id="sideActivity"></div>
            </div>
        </div>

        <div class="controls">
            <input type="number" id="betInput" value="30" min="10">
            <button id="playBtn" class="btn play-btn" onclick="startGame()">🎰 BET (እጣ አውጣ)</button>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:10px;">
            <button class="btn" style="background:var(--green);color:white; padding: 12px;" onclick="togglePanel('depPanel')">Deposit</button>
            <button class="btn" style="background:var(--red);color:white; padding: 12px;" onclick="togglePanel('withPanel')">Withdraw</button>
        </div>
    </div>

    <div id="adminPanel" class="panel">
        <h2 style="color:var(--gold)">Admin Panel</h2>
        <div style="margin-bottom:20px; border-bottom:1px solid #444; padding-bottom:15px;">
            <h4>የተጫዋች ባላንስ ሙላ</h4>
            <input type="text" id="targetId" placeholder="የተጫዋች ID">
            <input type="number" id="addBalanceAmt" placeholder="የገንዘብ መጠን">
            <button class="btn" style="background:var(--green); color:white" onclick="adminDeposit()">ገንዘብ ሙላ</button>
        </div>
        <h4>የወጪ ጥያቄዎች (Withdraw Requests)</h4>
        <table style="width:100%; border-collapse: collapse; font-size:12px; color: white;">
            <thead><tr style="background:#333; color: var(--gold);"><th>ID</th><th>መጠን</th><th>አካውንት</th></tr></thead>
            <tbody id="withdrawTableBody"></tbody>
        </table>
        <button class="btn" style="background:#444; color:white; margin-top: 20px;" onclick="togglePanel('adminPanel')">ዝጋ</button>
    </div>

    <div id="depPanel" class="panel">
        <h3 style="color:var(--green)">ገንዘብ ለመሙላት</h3>
        <p>በቴሌብር ወደ <b>0998012433</b> ይላኩ።</p>
        <p>ID ቁጥርዎን ለ <b>@filimoon21</b> መላክ አይርሱ።</p>
        <button class="btn" onclick="togglePanel('depPanel')">ዝጋ</button>
    </div>

    <div id="withPanel" class="panel">
        <h3 style="color:var(--red)">Withdraw</h3>
        <p style="font-size: 13px;">ዝቅተኛ 100 ብር</p>
        <input type="number" id="withAmt" placeholder="የብር መጠን">
        <input type="text" id="bankInfo" placeholder="ባንክ ወይም ቴሌብር አካውንት">
        <button class="btn" style="background:var(--red);color:white" onclick="requestWithdraw()">ጥያቄ ላክ</button>
        <button class="btn" style="background:#444; color:white;" onclick="togglePanel('withPanel')">ተመለስ</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand?.();

    let userData = JSON.parse(localStorage.getItem('keno_user')) || null;
    let withdrawRequests = JSON.parse(localStorage.getItem('admin_withdraws')) || [];
    let isPlaying = false;
    let selectedNums = new Set();
    let isCountingDown = false;
    let gamesPlayed = parseInt(localStorage.getItem('games_played')) || 0;

    function login() {
        const phone = document.getElementById('phoneInput').value;
        if (phone.length < 10) return alert("ትክክለኛ ስልክ ያስገቡ!");
        if(!userData) {
            userData = { id: phone, balance: 50.00, isNew: true };
            alert("የ 50 ብር ቦነስ ተሰጥቶዎታል!");
        }
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('gameArea').style.display = 'block';
        document.getElementById('userIdDisplay').innerText = "ID: " + userData.id;
        updateUI();
    }

    // Create Grid
    const grid = document.getElementById('kenoGrid');
    for (let i = 1; i <= 80; i++) {
        const d = document.createElement('div');
        d.className = 'num'; d.id = `n-${i}`; d.innerText = i;
        d.onclick = () => {
            if (isPlaying || isCountingDown) return;
            if (selectedNums.has(i)) { selectedNums.delete(i); d.classList.remove('selected'); }
            else if (selectedNums.size < 5) { selectedNums.add(i); d.classList.add('selected'); }
        };
        grid.appendChild(d);
    }

    function speak(t) {
        const m = new SpeechSynthesisUtterance(t);
        m.lang = 'en-US'; m.rate = 1.3;
        window.speechSynthesis.speak(m);
    }

    async function startGame() {
        if (selectedNums.size !== 2 && selectedNums.size !== 5) return alert("2 ወይም 5 ቁጥሮችን ይምረጡ!");
        const bet = parseFloat(document.getElementById('betInput').value);
        if (userData.balance < bet) return alert("ባላንስ የሎትም!");

        isPlaying = true;
        gamesPlayed++;
        localStorage.setItem('games_played', gamesPlayed);
        userData.balance -= bet; updateUI();
        document.getElementById('playBtn').disabled = true;
        document.getElementById('ballsContainer').innerHTML = "";
        document.querySelectorAll('.num').forEach(n => n.classList.remove('winner'));

        // --- Advance Business Logic (አንተ መክሰር የለብህም) ---
        let winners = [];
        let hitLimit = 0;

        if(userData.isNew && gamesPlayed <= 2) {
            hitLimit = selectedNums.size; // አዲስ ተጫዋች መጀመሪያ እንዲያሸንፍ
        } else {
            if(selectedNums.size === 5) {
                let prob = Math.random();
                if(bet >= 500) hitLimit = Math.floor(Math.random() * 2); // ትልቅ ብር ካስያዘ 0 ወይም 1 ብቻ
                else if(prob < 0.6) hitLimit = Math.floor(Math.random() * 2) + 2; // 60% ጊዜ 2 ወይም 3 ቁጥር
                else if(prob < 0.95) hitLimit = 4; // 35% ጊዜ 4 ቁጥር
                else hitLimit = 5; // 5% ጊዜ ብቻ 5 ቁጥር
            } else {
                hitLimit = (Math.random() < 0.4) ? 2 : 1; // 2 ቁጥር ለያዘ 40% ጊዜ 2ቱን እንዲያገኝ
            }
        }

        let myHits = Array.from(selectedNums).sort(() => Math.random() - 0.5).slice(0, hitLimit);

        while(winners.length < 20) {
            let r = Math.floor(Math.random() * 80) + 1;
            if(!winners.includes(r) && (!selectedNums.has(r) || myHits.includes(r))) winners.push(r);
        }

        // --- Drawing Process (1 sec per ball) ---
        for (let n of winners) {
            document.getElementById('currentNum').innerText = n;
            speak(n);
            const b = document.createElement('div'); b.className = 'ball'; b.innerText = n;
            document.getElementById('ballsContainer').appendChild(b);
            document.getElementById(`n-${n}`).classList.add('winner');
            await new Promise(r => setTimeout(r, 1000));
        }

        // Result & Win Logic
        let hits = Array.from(selectedNums).filter(x => winners.includes(x)).length;
        let winAmt = 0;
        if(selectedNums.size === 2 && hits === 2) winAmt = bet * 3;
        else if(selectedNums.size === 5) {
            if(hits === 5) winAmt = bet * 100;
            else if(hits === 4) winAmt = bet * 5;
            else if(hits === 3) winAmt = bet * 2;
        }

        if(winAmt > 0) {
            userData.balance += winAmt;
            document.getElementById('gameStatus').innerHTML = `<span style="color:var(--green)">አሸንፈዋል! +${winAmt} ETB</span>`;
            speak("Winner!");
        } else {
            document.getElementById('gameStatus').innerHTML = `<span style="color:var(--red)">እንደገና ይሞክሩ!</span>`;
        }
        
        if(gamesPlayed > 2) userData.isNew = false;
        updateUI();
        startNextRoundTimer();
    }

    function startNextRoundTimer() {
        isPlaying = false;
        isCountingDown = true;
        let sec = 35;
        const overlay = document.getElementById('countdownOverlay');
        const timerDisplay = document.getElementById('timerSec');
        overlay.style.display = 'flex';
        
        const timer = setInterval(() => {
            sec--;
            timerDisplay.innerText = sec;
            if(sec % 4 === 0) addFakeActivity(); // በየ 4 ሰከንዱ ፌክ ተጫዋች አሳይ

            if (sec <= 0) {
                clearInterval(timer);
                overlay.style.display = 'none';
                resetBoard();
            }
        }, 1000);
    }

    function resetBoard() {
        isCountingDown = false;
        document.getElementById('playBtn').disabled = false;
        document.getElementById('ballsContainer').innerHTML = "";
        document.getElementById('currentNum').innerText = "READY";
        document.querySelectorAll('.num').forEach(n => {
            n.classList.remove('winner');
            n.classList.remove('selected');
        });
        selectedNums.clear();
        document.getElementById('sideActivity').innerHTML = "";
        document.getElementById('gameStatus').innerText = "ቁጥሮችን ይምረጡ (2 ወይም 5)";
    }

    function addFakeActivity() {
        const side = document.getElementById('sideActivity');
        const idTail = Math.floor(1000 + Math.random() * 9000);
        const bet = [500, 1000, 3000, 5000, 10000][Math.floor(Math.random() * 5)];
        const nums = [Math.floor(Math.random()*80)+1, Math.floor(Math.random()*80)+1].join(',');
        const isWin = Math.random() < 0.3;
        
        const div = document.createElement('div');
        div.className = 'side-item';
        div.innerHTML = `
            <b>User_${idTail}</b><br>
            Bet: <b>${bet} ETB</b> | Nums: ${nums}<br>
            ${isWin ? '<span class="win-text">WON: '+(bet*3)+' ETB</span>' : '<span class="lose-text">LOST</span>'}
        `;
        side.prepend(div);
        if(side.children.length > 6) side.lastChild.remove();
    }

    function updateUI() {
        document.getElementById('balanceDisplay').innerText = userData.balance.toFixed(2);
        localStorage.setItem('keno_user', JSON.stringify(userData));
        localStorage.setItem('admin_withdraws', JSON.stringify(withdrawRequests));
        renderWithdrawTable();
    }

    function renderWithdrawTable() {
        const tbody = document.getElementById('withdrawTableBody');
        tbody.innerHTML = "";
        withdrawRequests.forEach(req => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${req.id}</td><td>${req.amount}</td><td>${req.account}</td>`;
            tbody.appendChild(tr);
        });
    }

    function adminDeposit() {
        const id = document.getElementById('targetId').value;
        const amt = parseFloat(document.getElementById('addBalanceAmt').value);
        if (userData.id === id) { userData.balance += amt; updateUI(); alert("ተሞልቷል!"); }
        else alert("ይህ ID በዚህ ስልክ ላይ አልተገኘም!");
    }

    function handleAdminOpen() {
        if(prompt("Admin Password:") === "fuadiran2129") togglePanel('adminPanel');
    }

    function togglePanel(id) {
        const p = document.getElementById(id);
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function requestWithdraw() {
        const amt = parseFloat(document.getElementById('withAmt').value);
        const acc = document.getElementById('bankInfo').value;
        if(amt < 100 || isNaN(amt)) return alert("ትክክለኛ መጠን ያስገቡ!");
        if(userData.balance < amt) return alert("በቂ ባላንስ የሎትም!");
        userData.balance -= amt;
        withdrawRequests.push({id: userData.id, amount: amt, account: acc});
        updateUI();
        alert("የመውጫ ጥያቄዎ ለአድሚን ተልኳል!");
        togglePanel('withPanel');
    }
</script>
</body>
</html>
